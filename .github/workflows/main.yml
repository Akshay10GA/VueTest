name: Build iOS Simulator App

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.1'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Root Dependencies
        run: npm ci

      - name: Install Capacitor Dependencies
        working-directory: ./src-capacitor
        run: npm ci

      - name: Build Web App (Quasar -> Capacitor)
        run: npx quasar build -m capacitor -T ios --skip-pkg

      - name: Sync Capacitor iOS
        working-directory: ./src-capacitor
        run: npx cap sync ios

      - name: Install CocoaPods
        working-directory: ./src-capacitor/ios
        run: |
          pod install --repo-update

      - name: Build iOS Simulator App
        run: |
          xcodebuild \
            -workspace src-capacitor/ios/App/App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath build \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Compress App Bundle
        working-directory: build/Build/Products/Debug-iphonesimulator
        run: zip -r App.zip App.app

      - name: Upload iOS Simulator Build
        uses: actions/upload-artifact@v4
        with:
          name: appetize-ios-simulator-build
          path: build/Build/Products/Debug-iphonesimulator/App.zip